[triage]
output_mode = "files"
files_dir = "docs/triage"
gh_repo = "energyoase/DBlicious"

[monitor]
trigger = "oneshot"
loop_interval_min = 15
sources = ["inline_markers"]
bug_reports_dir = ""
godot_log_path = ""
godot_log_max_mb = 5
godot_log_archive_dir = ""
auto_push = false

[executor]
parallelism = "sequential"
max_parallel = 3
conflict_policy = "ask"
branch_dev = "dev"
branch_main = "main"
