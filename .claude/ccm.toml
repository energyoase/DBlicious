[ccm.questions]
fallback_mode = "block"

# Keine [ccm.channels.*]-Sektionen — Solo-Mode, Daemon nicht in Verwendung.
# Keine [ccm.models]-Overrides — Defaults aus ccm-model-mapping.md greifen.
# Keine [ccm.review]-Sektion — Review-Pipeline kommt erst in M1+.
