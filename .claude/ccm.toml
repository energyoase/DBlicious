# Minimales CCM-Manifest fuer DBlicious (Solo-Mode, Sprint A-light / M0).
# Bootstrap manuell am 2026-05-20; spaeter durch /ccm-import-project --force
# ersetzbar (siehe docs/superpowers/specs/2026-05-20-ccm-approvals-ready-design.md
# Abschnitt "Quick-Win: Sprint A-light").

[ccm.project]
name                = "DBlicious"
roles               = ["dev"]
mode                = "solo"
default_branch_main = "main"
default_branch_dev  = "dev"

[ccm.meta]
schema_version = 1
created_by     = "manual-bootstrap@2026-05-20"
created_at     = "2026-05-20T00:00:00Z"

[ccm.questions]
fallback_mode = "block"

# Aus dem legacy `triage-config.toml::[executor]` uebernommen
# (ccm-upgrade-project, 2026-05-23). Solo-Mode laeuft heute sequentiell.
[ccm.orchestrator]
parallelism  = "sequential"
max_parallel = 3

# Test-/Lint-Gates (ccm-config-project, 2026-05-25). lint_cmd spiegelt die
# Git-Hooks: pre-commit=fmt, pre-push=clippy (.githooks/, Commit 9b0a5c1).
[ccm.runtime]
test_cmd = "cargo test --workspace"
lint_cmd = "cargo fmt --check && cargo clippy --workspace --all-targets -- -D warnings"

# Review-Stage zwischen done und archived. Solo: mode=block (kein Channel/Daemon
# fuer async). Notes wie Q0009 in docs/reviews.
[ccm.review]
require              = true
review_question_mode = "block"
default_reviewer     = "claude"
notes_dir            = "docs/reviews"
# auto_request=true, archive_after_days=7 = Defaults.

# Security-Review opt-in pro Item (Items setzen security_review.required selbst,
# wie Q0009). auto_detect_triggers um DBlicious-Code-Execution-Begriffe erweitert.
[ccm.security_review]
require              = false
auto_detect_triggers = ["auth", "crypto", "secrets", "ipc", "external-api", "script", "sandbox", "wasm", "plugin"]
notes_dir            = "docs/reviews"

# Opt-In: security_review aktivieren, damit der per-item-Flag tatsaechlich feuert.
[ccm.skills.enabled]
security_review = true
# review/debug/design/pr/new_skill/extract_skill = true (Default).

# GitHub-Integration (ccm-config-project, 2026-05-25; gh authed, origin energyoase/DBlicious).
[ccm.github]
enabled                = true
repo                   = "energyoase/DBlicious"
default_base_for_pr    = "dev"
default_base_for_merge = "main"
merge_method           = "squash"
# auto_push_promote=false, copilot_review_enabled=false = Defaults.

# Keine [ccm.channels.*]-Sektionen — Solo-Mode, Daemon nicht in Verwendung.
# Keine [ccm.models]-Overrides — Defaults aus ccm-model-mapping.md greifen.
